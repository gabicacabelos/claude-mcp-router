# ─────────────────────────────────────────────
# INDIVIDRA MCP ROUTER — Configuración principal
# ─────────────────────────────────────────────

# Modo de operación
# personal: sin anonimización, caché local, cero fricción
# team: caché compartida + anonimización básica
# enterprise: anonimización completa, auditoría ISO 27001
mode: personal

# ─────────────────────────────────────────────
# Proveedores
# ─────────────────────────────────────────────
providers:
  gemini:
    model: gemini-2.0-flash   # v1beta endpoint — 15 RPM, 1500 RPD free tier
    max_concurrent: 10             # asyncio.Semaphore — límite RPM free
    max_retries: 3
    backoff_base_seconds: 5        # 5 → 10 → 20 segundos
    timeout_seconds: 30

  groq:
    model: llama-3.1-8b-instant    # LPU ultra-rápido, ideal para clasificación
    max_tokens_per_classification: 100
    max_retries: 2
    timeout_seconds: 10

  openrouter:
    models:
      - mistralai/mistral-7b-instruct:free
      - google/gemma-3-4b-it:free
      - meta-llama/llama-3.2-3b-instruct:free
    max_retries: 2
    timeout_seconds: 45

# ─────────────────────────────────────────────
# Circuit Breaker
# ─────────────────────────────────────────────
circuit_breaker:
  failure_threshold: 5
  reset_timeout_seconds: 300

# ─────────────────────────────────────────────
# Caché
# ─────────────────────────────────────────────
cache:
  enabled: true
  ttl_static_seconds: 86400
  ttl_dynamic_seconds: 3600
  max_size_mb: 100

# ─────────────────────────────────────────────
# Detección de tiers
# ─────────────────────────────────────────────
tiers:
  tier0_extensions:
    - .py
    - .js
    - .ts
    - .json
    - .yaml
    - .yml
    - .toml
    - .sql
    - .env
    - .sh

  tier0_patterns:
    - "Traceback (most recent call last)"
    - "Error:"
    - "BEGIN TRANSACTION"
    - "-----BEGIN"

  tier1_max_tokens: 2000
  tier2_min_tokens: 10000

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging:
  save_stats: true
  stats_file: ./cache/stats.json
